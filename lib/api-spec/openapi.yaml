openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hearth — family AI workspace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profile
    description: User profile operations
  - name: notes
    description: Note operations
  - name: items
    description: Universal input items (lists, tables, records)
  - name: auction
    description: Auction entry operations
  - name: shipping
    description: Shipping calculation operations
  - name: links
    description: Business link organizer
  - name: ai
    description: AI processing operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/config:
    get:
      operationId: getAuthConfig
      tags: [auth]
      summary: Get public Supabase config for frontend auth bootstrap
      responses:
        "200":
          description: Supabase config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"
        "503":
          description: Supabase not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # PROFILE
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createProfile
      tags: [profile]
      summary: Create or update profile from free-text description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Profile created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # DASHBOARD
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  # NOTES
  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List all notes
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: notionSynced
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

    post:
      operationId: createNote
      tags: [notes]
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get a note by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notes/{id}/sync-notion:
    post:
      operationId: syncNoteToNotion
      tags: [notes]
      summary: Sync note to Notion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "400":
          description: Notion not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ITEMS (Universal Input)
  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List structured items
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [list, table, calculation, business_record, note]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"

    post:
      operationId: createItem
      tags: [items]
      summary: Create an item from natural language input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/summary:
    get:
      operationId: getItemsSummary
      tags: [items]
      summary: Get item type breakdown and totals
      responses:
        "200":
          description: Items summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsSummary"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # AUCTION
  /auction:
    get:
      operationId: listAuctionEntries
      tags: [auction]
      summary: List auction entries
      responses:
        "200":
          description: Auction entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuctionEntry"

    post:
      operationId: createAuctionEntry
      tags: [auction]
      summary: Create an auction entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuctionEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionEntry"

  /auction/{id}:
    patch:
      operationId: updateAuctionEntry
      tags: [auction]
      summary: Update an auction entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuctionEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionEntry"

    delete:
      operationId: deleteAuctionEntry
      tags: [auction]
      summary: Delete an auction entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # SHIPPING
  /shipping:
    get:
      operationId: listShippingCalculations
      tags: [shipping]
      summary: List saved shipping calculations
      responses:
        "200":
          description: Shipping calculations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShippingCalculation"

    post:
      operationId: calculateShipping
      tags: [shipping]
      summary: Calculate and save a shipping estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShippingInput"
      responses:
        "201":
          description: Calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingCalculation"

  /shipping/{id}:
    delete:
      operationId: deleteShippingCalculation
      tags: [shipping]
      summary: Delete a shipping calculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # BUSINESS LINKS
  /links:
    get:
      operationId: listLinks
      tags: [links]
      summary: List business links
      responses:
        "200":
          description: Links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessLink"

    post:
      operationId: createLink
      tags: [links]
      summary: Save a business link with AI-generated summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessLink"

  /links/{id}:
    delete:
      operationId: deleteLink
      tags: [links]
      summary: Delete a business link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # AI
  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIChatResponse"

  /ai/process:
    post:
      operationId: aiProcess
      tags: [ai]
      summary: Process natural language input into structured data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProcessInput"
      responses:
        "200":
          description: Structured output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProcessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    # AUTH
    AuthConfig:
      type: object
      required: [supabaseUrl, supabaseAnonKey]
      properties:
        supabaseUrl:
          type: string
        supabaseAnonKey:
          type: string

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time

    # PROFILE
    ProfileInput:
      type: object
      required: [rawText]
      properties:
        rawText:
          type: string
          description: Free-text description of user's role and use cases

    Profile:
      type: object
      required: [id, userId, rawText, role, useCases, tone, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        rawText:
          type: string
        role:
          type: string
        useCases:
          type: array
          items:
            type: string
        tone:
          type: string
        notionConnected:
          type: boolean
        notionAccessToken:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # DASHBOARD
    Dashboard:
      type: object
      required: [totalNotes, totalItems, itemsByType, recentNotes, recentItems, auctionTotal]
      properties:
        totalNotes:
          type: integer
        totalItems:
          type: integer
        itemsByType:
          type: array
          items:
            $ref: "#/components/schemas/TypeCount"
        recentNotes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        recentItems:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        auctionTotal:
          type: number
          description: Total value of all auction bids

    TypeCount:
      type: object
      required: [type, count]
      properties:
        type:
          type: string
        count:
          type: integer

    # NOTES
    NoteInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string

    NoteUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string

    Note:
      type: object
      required: [id, userId, title, content, notionSynced, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        content:
          type: string
        notionSynced:
          type: boolean
        notionPageId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ITEMS
    ItemInput:
      type: object
      required: [rawText]
      properties:
        rawText:
          type: string

    ItemUpdate:
      type: object
      properties:
        title:
          type: string
        rawText:
          type: string
        structuredData:
          type: object
          additionalProperties: true

    Item:
      type: object
      required: [id, userId, rawText, type, title, structuredData, total, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        rawText:
          type: string
        type:
          type: string
          enum: [list, table, calculation, business_record, note]
        title:
          type: string
        structuredData:
          type: object
          additionalProperties: true
        total:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ItemsSummary:
      type: object
      required: [total, byType]
      properties:
        total:
          type: integer
        byType:
          type: array
          items:
            $ref: "#/components/schemas/TypeCount"

    # AUCTION
    AuctionEntryInput:
      type: object
      required: [item, winningBid, buyer, date]
      properties:
        item:
          type: string
        winningBid:
          type: number
        buyer:
          type: string
        date:
          type: string
          format: date

    AuctionEntryUpdate:
      type: object
      properties:
        item:
          type: string
        winningBid:
          type: number
        buyer:
          type: string
        date:
          type: string
          format: date

    AuctionEntry:
      type: object
      required: [id, userId, item, winningBid, buyer, date, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        item:
          type: string
        winningBid:
          type: number
        buyer:
          type: string
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    # SHIPPING
    ShippingInput:
      type: object
      required: [origin, destination, weightKg]
      properties:
        origin:
          type: string
        destination:
          type: string
        weightKg:
          type: number
        description:
          type: string

    ShippingCalculation:
      type: object
      required: [id, userId, origin, destination, weightKg, estimatedCost, currency, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        origin:
          type: string
        destination:
          type: string
        weightKg:
          type: number
        description:
          type: ["string", "null"]
        estimatedCost:
          type: number
        currency:
          type: string
        createdAt:
          type: string
          format: date-time

    # LINKS
    LinkInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        label:
          type: string

    BusinessLink:
      type: object
      required: [id, userId, url, label, aiSummary, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        url:
          type: string
        label:
          type: string
        aiSummary:
          type: string
        createdAt:
          type: string
          format: date-time

    # AI
    AIChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    AIChatResponse:
      type: object
      required: [message, provider]
      properties:
        message:
          type: string
        provider:
          type: string

    AIProcessInput:
      type: object
      required: [text]
      properties:
        text:
          type: string

    AIProcessResponse:
      type: object
      required: [type, title, structuredData, total, provider]
      properties:
        type:
          type: string
          enum: [list, table, calculation, business_record, note]
        title:
          type: string
        structuredData:
          type: object
          additionalProperties: true
        total:
          type: ["number", "null"]
        provider:
          type: string
